<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Pipeline Board - OverAssessed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    :root {
      --bg: #0b0d12;
      --bg-2: #11141b;
      --panel: #161a23;
      --panel-2: #1d2230;
      --border: #232838;
      --border-2: #2c3245;
      --text: #e6e9ef;
      --text-dim: #9aa3b2;
      --text-mute: #6b7385;
      --accent: #7c9cff;
      --good: #4ade80;
      --good-bg: rgba(74,222,128,0.1);
      --warn: #fbbf24;
      --warn-bg: rgba(251,191,36,0.1);
      --bad: #f87171;
      --bad-bg: rgba(248,113,113,0.1);
      --info: #60a5fa;
      --info-bg: rgba(96,165,250,0.1);
      --muted: #6b7385;
      --muted-bg: rgba(107,115,133,0.1);
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }
    /* ── Header ─────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .topbar .stats {
      display: flex;
      gap: 20px;
      margin-left: auto;
      font-size: 13px;
      color: var(--text-dim);
    }
    .topbar .stats strong { color: var(--text); font-weight: 600; }
    .topbar a.btn {
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid var(--border-2);
      border-radius: 6px;
      font-size: 13px;
      transition: 0.15s;
    }
    .topbar a.btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Board ──────────────────────────────────────── */
    .board {
      display: flex;
      gap: 12px;
      padding: 16px;
      overflow-x: auto;
      min-height: calc(100vh - 56px);
    }
    .column {
      flex: 0 0 320px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 90px);
    }
    .column-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky; top: 0;
      background: var(--panel);
      border-radius: 10px 10px 0 0;
      z-index: 1;
    }
    .column-header .icon { font-size: 16px; }
    .column-header .label { font-weight: 600; font-size: 13px; }
    .column-header .count {
      margin-left: auto;
      background: var(--panel-2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
    }
    .column-header .revsum {
      font-size: 11px;
      color: var(--text-mute);
      margin-left: 6px;
    }
    .column.tone-good .column-header { border-bottom-color: var(--good); }
    .column.tone-warn .column-header { border-bottom-color: var(--warn); }
    .column.tone-bad  .column-header { border-bottom-color: var(--bad); }
    .column.tone-info .column-header { border-bottom-color: var(--info); }
    .column.tone-muted .column-header { border-bottom-color: var(--muted); }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .column-body::-webkit-scrollbar { width: 6px; }
    .column-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
    .empty {
      padding: 20px 12px;
      text-align: center;
      color: var(--text-mute);
      font-size: 12px;
      font-style: italic;
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: 0.12s;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    /* Phase 6: high-value highlight */
    .card.high-value {
      border-color: rgba(74,222,128,0.4);
      box-shadow: inset 3px 0 0 var(--good);
    }
    .card.high-value:hover { border-color: var(--good); }
    .card.stale-warning   { box-shadow: inset 3px 0 0 var(--warn); }
    .card.stale-critical  { box-shadow: inset 3px 0 0 var(--bad); }
    .card.high-value.stale-warning  { box-shadow: inset 3px 0 0 var(--good), inset 0 -2px 0 var(--warn); }
    .card.high-value.stale-critical { box-shadow: inset 3px 0 0 var(--good), inset 0 -2px 0 var(--bad); }
    .badge-hv    { background: var(--good-bg); color: var(--good); }
    .badge-stale-warning  { background: var(--warn-bg); color: var(--warn); }
    .badge-stale-critical { background: var(--bad-bg);  color: var(--bad); }
    /* Phase 8: automation badge classes (Tyler msg 28665) */
    .badge-auto      { background: rgba(124,156,255,0.12); color: var(--accent); }
    .badge-overdue   { background: var(--warn-bg); color: var(--warn); }
    .badge-escalated { background: var(--bad-bg); color: var(--bad); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .card-line1 {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .card-id {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 11px;
      color: var(--text-mute);
      font-weight: 500;
    }
    .card-vip {
      font-size: 11px;
      color: var(--warn);
      margin-left: auto;
    }
    .card-owner {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-addr {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-money {
      display: flex;
      gap: 12px;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .card-money .label { color: var(--text-mute); }
    .card-money .val   { color: var(--text); font-weight: 600; }
    .card-money .val.rev { color: var(--good); }
    .card-money .val.zero { color: var(--text-mute); font-weight: 400; }

    .card-na {
      font-size: 12px;
      color: var(--text-dim);
      background: rgba(124,156,255,0.06);
      border-left: 2px solid var(--accent);
      padding: 5px 8px;
      border-radius: 3px;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }
    .card-na .icon { flex-shrink: 0; }
    .card-na .txt {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-foot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }
    .badge {
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .badge-status {
      background: var(--info-bg);
      color: var(--info);
    }
    .badge-locked {
      background: var(--warn-bg);
      color: var(--warn);
    }
    .card-time {
      margin-left: auto;
      color: var(--text-mute);
      font-size: 11px;
    }

    /* ── Phase 6: Today's Focus panel ───────────────── */
    .focus-panel {
      margin: 16px 16px 0;
      background: linear-gradient(135deg, rgba(124,156,255,0.08), rgba(74,222,128,0.05));
      border: 1px solid var(--border-2);
      border-radius: 12px;
      padding: 14px 18px;
    }
    .focus-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .focus-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .focus-head .sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }
    .focus-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .focus-card {
      flex: 0 0 280px;
      background: var(--panel-2);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: 0.12s;
    }
    .focus-card:hover { border-color: var(--accent); }
    .focus-card .ftop { display: flex; align-items: center; gap: 6px; }
    .focus-card .frank {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: #0b0d12;
      font-weight: 800;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .focus-card .fid { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-mute); }
    .focus-card .fowner { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .focus-card .frev   { font-size: 18px; color: var(--good); font-weight: 800; }
    .focus-card .fstage { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
    .focus-card .fbadges { display: flex; gap: 6px; margin-top: 4px; }
    .focus-card .fcta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--accent);
      color: #0b0d12;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      transition: 0.12s;
    }
    .focus-card .fcta:hover { background: #9bb5ff; transform: translateY(-1px); }
    .focus-card .fcta.cta-good    { background: var(--good); }
    .focus-card .fcta.cta-warn    { background: var(--warn); color: #1a1410; }
    .focus-card .fcta.cta-muted   { background: var(--panel); color: var(--text); border: 1px solid var(--border-2); }
    .focus-card .fcta:disabled,
    .focus-card .fcta[disabled]   { opacity: 0.45; cursor: not-allowed; transform: none; pointer-events: none; }
    .focus-card .fcta-hidden      { display: none; }
    .focus-empty {
      padding: 20px;
      text-align: center;
      color: var(--text-mute);
      font-style: italic;
    }

    /* ── Phase 7: Confirm modal ─────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--panel);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      padding: 24px;
      width: min(420px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-box h3 { margin: 0 0 10px; font-size: 16px; font-weight: 700; }
    .modal-box p  { margin: 0 0 16px; color: var(--text-dim); font-size: 14px; line-height: 1.5; }
    .modal-box .case-pill {
      display: inline-block;
      background: var(--panel-2); border: 1px solid var(--border-2);
      border-radius: 6px; padding: 4px 10px;
      font-family: ui-monospace, monospace; font-size: 12px;
      color: var(--text-dim); margin-bottom: 14px;
    }
    .modal-box textarea {
      width: 100%; background: var(--bg-2); border: 1px solid var(--border-2);
      border-radius: 6px; color: var(--text); padding: 8px 10px;
      font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px;
      margin-bottom: 16px; box-sizing: border-box;
    }
    .modal-box textarea:focus { outline: none; border-color: var(--accent); }
    .modal-box .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-box .modal-actions button {
      padding: 8px 18px; border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
    }
    .modal-btn-cancel { background: var(--panel-2); color: var(--text-dim); border: 1px solid var(--border-2) !important; }
    .modal-btn-cancel:hover { color: var(--text); }
    .modal-btn-confirm        { background: var(--accent); color: #0b0d12; }
    .modal-btn-confirm.good   { background: var(--good); }
    .modal-btn-confirm.danger { background: var(--bad); color: #fff; }

    /* ── Phase 7: Toast ─────────────────────────────────── */
    .toast-rack {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 600;
    }
    .toast {
      padding: 10px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: slideIn 0.2s ease;
      cursor: pointer;
    }
    .toast-ok    { background: var(--good-bg); border: 1px solid var(--good); color: var(--good); }
    .toast-error { background: var(--bad-bg);  border: 1px solid var(--bad);  color: var(--bad);  }
    .toast-info  { background: var(--info-bg); border: 1px solid var(--info); color: var(--info); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── Loading / Error ────────────────────────────── */
    .state-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: var(--bg);
      z-index: 1000;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err {
      color: var(--bad);
      padding: 12px 20px;
      background: var(--bad-bg);
      border: 1px solid var(--bad);
      border-radius: 6px;
      max-width: 600px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>📊 Pipeline Board</h1>
    <div class="stats" id="stats"></div>
    <a href="/dashboard" class="btn">Dashboard</a>
    <a href="#" id="refreshBtn" class="btn">↻ Refresh</a>
  </div>

  <div id="focusPanel" class="focus-panel" style="display:none;">
    <div class="focus-head">
      <h2>🎯 Today's Focus</h2>
      <div class="sub" id="focusSub"></div>
    </div>
    <div class="focus-row" id="focusRow"></div>
  </div>

  <div class="board" id="board"></div>

  <div class="state-overlay" id="loading">
    <div class="spinner"></div>
    <div style="color:var(--text-dim);font-size:13px;">Loading pipeline...</div>
  </div>

  <!-- Phase 7: Confirm modal & toast rack -->
  <div class="modal-overlay" id="confirmModal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h3 id="cmTitle"></h3>
      <div id="cmCasePill" class="case-pill"></div>
      <p id="cmMsg"></p>
      <textarea id="cmReason" placeholder="Reason (optional)" rows="2"></textarea>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="cmCancel">Cancel</button>
        <button class="modal-btn-confirm" id="cmOk">Confirm</button>
      </div>
    </div>
  </div>
  <div class="toast-rack" id="toastRack"></div>

  <script src="/lib/auth-client.js"></script>
  <script>
    'use strict';

    const currentUser = AuthClient.requireAuth();
    if (!currentUser) { /* redirected */ }

    // ── helpers ──────────────────────────────────────────
    function isAdmin() { return (currentUser && currentUser.role) === 'admin'; }

    function showToast(msg, type = 'info', ms = 4000) {
      const rack = document.getElementById('toastRack');
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      t.onclick = () => t.remove();
      rack.appendChild(t);
      setTimeout(() => t.remove(), ms);
    }

    // Returns Promise<{ ok: bool, reason: string }>
    function confirmAction(opts = {}) {
      return new Promise(resolve => {
        const modal = document.getElementById('confirmModal');
        document.getElementById('cmTitle').textContent    = opts.title   || 'Confirm';
        document.getElementById('cmMsg').textContent      = opts.message || 'Are you sure?';
        const pill = document.getElementById('cmCasePill');
        pill.textContent = opts.caseId || '';
        pill.style.display = opts.caseId ? '' : 'none';
        const reasonEl = document.getElementById('cmReason');
        reasonEl.value = '';
        reasonEl.style.display = opts.askReason !== false ? '' : 'none';
        const okBtn = document.getElementById('cmOk');
        okBtn.textContent = opts.confirmLabel || 'Confirm';
        okBtn.className = 'modal-btn-confirm' + (opts.danger ? ' danger' : opts.good ? ' good' : '');
        modal.classList.add('open');
        const cleanup = (val) => { modal.classList.remove('open'); resolve(val); };
        okBtn.onclick   = () => cleanup({ ok: true,  reason: reasonEl.value.trim() });
        document.getElementById('cmCancel').onclick = () => cleanup({ ok: false });
      });
    }

    const fmtMoney = (n) => {
      if (n == null || isNaN(Number(n)) || Number(n) === 0) return '-';
      const v = Number(n);
      if (v >= 1000) return '$' + Math.round(v).toLocaleString();
      return '$' + v.toFixed(0);
    };

    const fmtTime = (iso) => {
      if (!iso) return '-';
      const d = new Date(iso);
      const now = new Date();
      const diffMs = now - d;
      const mins = Math.floor(diffMs / 60000);
      const hrs  = Math.floor(diffMs / 3600000);
      const days = Math.floor(diffMs / 86400000);
      if (mins < 60) return mins + 'm ago';
      if (hrs  < 24) return hrs  + 'h ago';
      if (days <  7) return days + 'd ago';
      return d.toISOString().slice(0, 10);
    };

    const escapeHtml = (s) => String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    function renderCard(card) {
      const rev = card.estimated_revenue;
      const sav = card.estimated_tax_savings;
      const naIcon = card.next_action_icon || '👉';
      const naText = card.next_action || 'No next action';
      const status = card.status || '-';
      const locked = card.flags && card.flags.manual_status_lock;
      const vip = card.flags && card.flags.vip;
      const hv = card.high_value === true;
      const stale = card.stale_level; // 'fresh' | 'warning' | 'critical' | null
      const days = card.days_since_last_activity;
      const url = '/case?id=' + encodeURIComponent(card.case_id);

      const classes = ['card'];
      if (hv) classes.push('high-value');
      if (stale === 'warning')  classes.push('stale-warning');
      if (stale === 'critical') classes.push('stale-critical');

      const staleBadge = (stale === 'warning' || stale === 'critical')
        ? `<span class="badge badge-stale-${stale}" title="${days}d since last activity">⏱ ${days}d</span>`
        : '';
      const hvBadge = hv ? '<span class="badge badge-hv" title="High value (≥$3k)">💰 HV</span>' : '';
      // Phase 8: automation badges for board card
      const autoBadge    = card.automation_followup  ? '<span class="badge badge-auto" title="Auto follow-up sent recently">⚡ Auto</span>' : '';
      const overdueBadge = card.automation_overdue   ? '<span class="badge badge-overdue" title="Action overdue">⏰ Overdue</span>' : '';
      const escalBadge   = card.automation_escalated ? '<span class="badge badge-escalated" title="Escalated">🔥 Escalated</span>' : '';

      return `
        <a class="${classes.join(' ')}" href="${url}">
          <div class="card-line1">
            <span class="card-id">${escapeHtml(card.case_id)}</span>
            ${vip ? '<span class="card-vip" title="VIP">⭐</span>' : ''}
          </div>
          <div class="card-owner">${escapeHtml(card.owner_name)}</div>
          <div class="card-addr">${escapeHtml(card.address)}</div>
          <div class="card-money">
            <div><span class="label">Rev</span> <span class="val rev ${!rev ? 'zero' : ''}">${fmtMoney(rev)}</span></div>
            <div><span class="label">Tax Sav</span> <span class="val ${!sav ? 'zero' : ''}">${fmtMoney(sav)}</span></div>
          </div>
          <div class="card-na" title="${escapeHtml(naText)}">
            <span class="icon">${naIcon}</span>
            <span class="txt">${escapeHtml(naText)}</span>
          </div>
          <div class="card-foot">
            ${hvBadge}
            ${staleBadge}
            ${autoBadge}${overdueBadge}${escalBadge}
            <span class="badge badge-status">${escapeHtml(status)}</span>
            ${locked ? '<span class="badge badge-locked" title="manual_status_lock=true">🔒 Lock</span>' : ''}
            <span class="card-time">${fmtTime(card.last_activity_at)}</span>
          </div>
        </a>`;
    }

    // ── Phase 7: Today's Focus — action engine ────────────
    //
    // Role matrix:
    //   approve_filing  → admin only  (mutates state via controller)
    //   send_aoa        → admin+operator  (deep-link to case page)
    //   request_nov     → admin+operator  (deep-link to case page)
    //   review_case     → all           (navigation)
    //
    // Approve Filing fires POST /api/case-view/event {event:'approve_for_filing'}
    // after a confirmation modal. All others navigate to /case?id=X&action=<cta>
    // so the tested case-page flows handle the actual customer communication.

    const CTA_META = {
      send_aoa:       { label: 'Send AOA',       tone: 'cta-warn', adminOnly: false, mutation: false },
      request_nov:    { label: 'Request NOV',    tone: 'cta-warn', adminOnly: false, mutation: false },
      approve_filing: { label: 'Approve Filing', tone: 'cta-good', adminOnly: true,  mutation: true  },
      review_case:    { label: 'Review Case',    tone: 'cta-muted',adminOnly: false, mutation: false },
    };

    // Send a controller event with auth; returns {ok, ...result} or throws.
    async function postCaseEvent(caseId, event, payload = {}) {
      const r = await AuthClient.fetchAuthed('/api/case-view/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ case_id: caseId, event, payload }),
      });
      const body = await r.json();
      if (!r.ok) throw Object.assign(new Error(body.error || 'HTTP ' + r.status), { status: r.status, body });
      return body;
    }

    // The one mutation: Approve Filing (admin-only, confirmation required).
    async function doApproveFiling(caseId, ownerName, revenue, btnEl) {
      if (!isAdmin()) { showToast('❌ Admin only — ask Tyler', 'error'); return; }
      const c = await confirmAction({
        title: '✅ Approve for Filing',
        caseId,
        message: `This will mark ${escapeHtml(ownerName || caseId)} (${fmtMoney(revenue)}) as READY_TO_FILE. The filing pipeline can then pick it up.`,
        confirmLabel: '✅ Approve',
        askReason: true,
        good: true,
      });
      if (!c.ok) return;

      // Disable button & show spinner during request
      const origText = btnEl.textContent;
      btnEl.disabled = true;
      btnEl.textContent = '⏳ Approving…';
      try {
        const result = await postCaseEvent(caseId, 'approve_for_filing', {
          reason: c.reason || 'Approved from Pipeline Board',
        });
        showToast(`✅ ${caseId} approved for filing`, 'ok');
        // Remove the card from Today's Focus after success (optimistic)
        const card = btnEl.closest('.focus-card');
        if (card) {
          card.style.transition = 'opacity 0.3s';
          card.style.opacity = '0';
          setTimeout(() => { card.remove(); updateFocusMeta(); }, 320);
        }
        console.log('[board] approve_for_filing result', result);
      } catch (e) {
        showToast(`❌ ${caseId}: ${e.body?.error || e.message}`, 'error', 6000);
        btnEl.disabled = false;
        btnEl.textContent = origText;
      }
    }

    function updateFocusMeta() {
      const remaining = document.querySelectorAll('#focusRow .focus-card').length;
      if (remaining === 0) {
        document.getElementById('focusRow').innerHTML =
          '<div class="focus-empty">All caught up — no actionable cases right now. ↻ Refresh to reload.</div>';
      }
    }

    function renderFocusCard(card, idx) {
      const cta = card.cta || { action: 'review_case' };
      const meta = CTA_META[cta.action] || CTA_META.review_case;
      const hv    = card.high_value === true;
      const stale = card.stale_level;
      const days  = card.days_since_last_activity;
      const hvBadge    = hv ? '<span class="badge badge-hv">💰 HV</span>' : '';
      const staleBadge = (stale === 'warning' || stale === 'critical')
        ? `<span class="badge badge-stale-${stale}">⏱ ${days}d</span>` : '';
      // Phase 8: automation badges for focus card
      const fAutoBadge = card.automation_followup  ? '<span class="badge badge-auto">⚡ Auto</span>' : '';
      const fOvBadge   = card.automation_overdue   ? '<span class="badge badge-overdue">⏰ Overdue</span>' : '';
      const fEscBadge  = card.automation_escalated ? '<span class="badge badge-escalated">🔥 Escalated</span>' : '';

      // Role gate: admin-only CTAs are hidden (not just disabled) for operators/guests.
      const adminOnly = meta.adminOnly;
      const canAct    = adminOnly ? isAdmin() : true;
      const hiddenCls = (adminOnly && !isAdmin()) ? ' fcta-hidden' : '';

      // Navigation CTA (no mutation) — plain anchor.
      // Mutation CTA (approve_filing) — button with data attrs for JS delegation.
      let ctaHtml;
      if (meta.mutation) {
        ctaHtml = `<button
          class="fcta ${meta.tone}${hiddenCls}"
          data-action="approve_filing"
          data-case-id="${escapeHtml(card.case_id)}"
          data-owner="${escapeHtml(card.owner_name || '')}"
          data-revenue="${card.estimated_revenue || 0}"
          ${!canAct ? 'disabled aria-disabled="true"' : ''}
        >${meta.label} →</button>`;
      } else {
        const href = cta.url || `/case?id=${encodeURIComponent(card.case_id)}&action=${cta.action || 'review_case'}`;
        ctaHtml = `<a class="fcta ${meta.tone}" href="${href}">${meta.label} →</a>`;
      }

      // Secondary "Open case" link — always visible
      const caseUrl = `/case?id=${encodeURIComponent(card.case_id)}`;

      return `
        <div class="focus-card" data-case-id="${escapeHtml(card.case_id)}">
          <div class="ftop">
            <div class="frank">${idx + 1}</div>
            <span class="fid">${escapeHtml(card.case_id)}</span>
            <span class="fstage" style="margin-left:auto;">${escapeHtml(card.stage_label || card.stage)}</span>
          </div>
          <div class="fowner">${escapeHtml(card.owner_name)}</div>
          <div class="frev">${fmtMoney(card.estimated_revenue)}</div>
          <div class="fbadges">${hvBadge}${staleBadge}${fAutoBadge}${fOvBadge}${fEscBadge}</div>
          <div style="display:flex;gap:8px;margin-top:6px;">
            ${ctaHtml}
            <a class="fcta cta-muted" href="${caseUrl}" style="flex:0 0 auto;padding:8px 10px;font-size:12px;" title="Open case page">↗</a>
          </div>
        </div>`;
    }

    // Event delegation for mutation buttons (approve_filing)
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action="approve_filing"]');
      if (!btn) return;
      e.preventDefault();
      doApproveFiling(
        btn.dataset.caseId,
        btn.dataset.owner,
        Number(btn.dataset.revenue),
        btn
      );
    });

    async function loadFocus() {
      try {
        const r = await AuthClient.fetchAuthed('/api/pipeline-priority/today');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const panel = document.getElementById('focusPanel');
        const row = document.getElementById('focusRow');
        const sub = document.getElementById('focusSub');
        if (!data.cases || !data.cases.length) {
          row.innerHTML = '<div class="focus-empty">All caught up — no actionable cases right now.</div>';
          sub.textContent = '';
        } else {
          row.innerHTML = data.cases.map(renderFocusCard).join('');
          const stale = data.stale_critical_count + data.stale_warning_count;
          sub.textContent = `${data.count} cases · ${fmtMoney(data.total_revenue)} potential · ${stale} stale`;
        }
        panel.style.display = 'block';
      } catch (e) {
        console.warn('Today Focus failed:', e.message);
      }
    }

    function renderColumn(col) {
      const tone = col.tone || 'info';
      const revSum = col.revenue_sum > 0 ? '· ' + fmtMoney(col.revenue_sum) : '';
      const cards = col.cards.length
        ? col.cards.map(renderCard).join('')
        : '<div class="empty">No cases</div>';
      return `
        <div class="column tone-${tone}" data-col="${col.id}">
          <div class="column-header">
            <span class="icon">${col.icon || ''}</span>
            <span class="label">${escapeHtml(col.label)}</span>
            <span class="count">${col.count}</span>
            <span class="revsum">${revSum}</span>
          </div>
          <div class="column-body">${cards}</div>
        </div>`;
    }

    async function loadBoard() {
      const loading = document.getElementById('loading');
      loading.style.display = 'flex';
      try {
        const r = await AuthClient.fetchAuthed('/api/pipeline-board');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();

        // Stats
        const totalRev = data.total_estimated_revenue || 0;
        document.getElementById('stats').innerHTML = `
          <div><strong>${data.total_cases}</strong> cases</div>
          <div>${fmtMoney(totalRev)} pipeline</div>
          <div style="color:var(--text-mute);">${data.latency_ms}ms</div>
        `;

        // Board
        const html = data.column_order.map(id => renderColumn(data.columns[id])).join('');
        document.getElementById('board').innerHTML = html;
      } catch (e) {
        document.getElementById('board').innerHTML =
          `<div class="err">Failed to load pipeline: ${escapeHtml(e.message)}</div>`;
      } finally {
        loading.style.display = 'none';
      }
    }

    function refreshAll() { loadFocus(); loadBoard(); }

    document.getElementById('refreshBtn').addEventListener('click', (e) => {
      e.preventDefault();
      refreshAll();
    });

    refreshAll();
  </script>
</body>
</html>

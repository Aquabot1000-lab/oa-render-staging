<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
.container { width: 1080px; height: 1080px; background: linear-gradient(135deg, #6c5ce7 0%, #0984e3 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; position: relative; }
.big-number { font-size: 160px; font-weight: 900; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.3); line-height: 1; }
.sub-number { font-size: 28px; color: rgba(255,255,255,0.85); margin-top: 10px; margin-bottom: 50px; font-weight: 500; }
.steps { width: 100%; max-width: 700px; }
.step { display: flex; align-items: center; gap: 20px; margin: 16px 0; }
.step-icon { font-size: 36px; width: 50px; text-align: center; }
.step-text { font-size: 26px; color: white; font-weight: 600; }
.divider { width: 100%; height: 2px; background: rgba(255,255,255,0.2); margin: 30px 0; }
.bottom-row { display: flex; gap: 30px; margin-top: 10px; }
.badge { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 15px 25px; text-align: center; }
.badge-big { font-size: 28px; font-weight: 800; color: white; }
.badge-small { font-size: 16px; color: rgba(255,255,255,0.7); margin-top: 4px; }
.logo { position: absolute; bottom: 40px; right: 50px; }
.logo-text { font-size: 28px; font-weight: 800; color: white; }
.logo-sub { font-size: 16px; color: rgba(255,255,255,0.6); text-align: right; }
</style>
</head>
<body>
<div class="container">
  <div class="big-number">$4,200</div>
  <div class="sub-number">Average annual savings for Texas homeowners who protest</div>
  <div class="steps">
    <div class="step"><div class="step-icon">📋</div><div class="step-text">We pull your property data</div></div>
    <div class="step"><div class="step-icon">📊</div><div class="step-text">We find comps proving you're overassessed</div></div>
    <div class="step"><div class="step-icon">📝</div><div class="step-text">We file the formal protest</div></div>
    <div class="step"><div class="step-icon">🏛️</div><div class="step-text">We represent you at the hearing</div></div>
  </div>
  <div class="divider"></div>
  <div class="bottom-row">
    <div class="badge">
      <div class="badge-big">20%</div>
      <div class="badge-small">Of savings only</div>
    </div>
    <div class="badge">
      <div class="badge-big">$0</div>
      <div class="badge-small">Upfront cost</div>
    </div>
    <div class="badge">
      <div class="badge-big">May 15</div>
      <div class="badge-small">TX deadline</div>
    </div>
  </div>
  <div class="logo">
    <div class="logo-text">OverAssessed</div>
    <div class="logo-sub">overassessed.ai</div>
  </div>
</div>
</body>
</html>

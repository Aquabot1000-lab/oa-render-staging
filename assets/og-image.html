<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6c5ce7, #0984e3);
    font-family: 'Inter', -apple-system, sans-serif;
    color: #fff;
    text-align: center;
  }
  .wordmark {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 36px;
    font-weight: 600;
    opacity: 0.95;
    margin-bottom: 24px;
  }
  .tagline {
    font-size: 22px;
    font-weight: 500;
    opacity: 0.8;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="wordmark">OverAssessed</div>
  <div class="subtitle">Stop Overpaying Property Taxes</div>
  <div class="tagline">Real Experts. Real Results. Guaranteed.</div>
</body>
</html>

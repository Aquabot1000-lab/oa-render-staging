name: State Controller Guard

on:
  pull_request:
    paths:
      - 'server/**/*.js'
  push:
    branches: [main]
    paths:
      - 'server/**/*.js'

jobs:
  check-state-writes:
    name: No direct state/metric writes to submissions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run state-controller guard
        working-directory: server
        run: node scripts/check-state-writes.js

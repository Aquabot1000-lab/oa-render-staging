<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Case View — OverAssessed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

        /* Top bar */
        .topbar { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-left a { color: #818cf8; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .topbar-left a:hover { color: #a5b4fc; }
        .case-id-badge { background: #312e81; color: #c7d2fe; padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
        .status-pill { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-ready-to-file { background: #065f46; color: #6ee7b7; }
        .status-needs-review { background: #78350f; color: #fcd34d; }
        .status-awaiting-notice { background: #1e3a5f; color: #93c5fd; }
        .status-new { background: #312e81; color: #c7d2fe; }
        .status-analysis-complete { background: #4c1d95; color: #c4b5fd; }
        .status-no-case { background: #3f3f46; color: #a1a1aa; }
        .topbar-right { display: flex; gap: 10px; }
        .topbar-right button { padding: 7px 16px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #818cf8; }
        .btn-outline { background: transparent; color: #a5b4fc; border: 1px solid #3730a3; }
        .btn-outline:hover { background: #1e1b4b; }
        .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
        .btn-danger:hover { background: #991b1b; }
        .btn-success { background: #065f46; color: #6ee7b7; }
        .btn-success:hover { background: #047857; }

        /* Layout */
        .page { display: grid; grid-template-columns: 1fr 420px; gap: 0; min-height: calc(100vh - 56px); }
        .main-col { padding: 24px; overflow-y: auto; }
        .side-col { background: #141621; border-left: 1px solid #2d3148; padding: 24px; overflow-y: auto; }

        /* Cards */
        .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 14px 20px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; justify-content: space-between; }
        .card-header h3 { font-size: 14px; font-weight: 700; color: #c7d2fe; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-header .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #312e81; color: #a5b4fc; }
        .card-body { padding: 20px; }

        /* Customer section */
        .customer-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .customer-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: white; flex-shrink: 0; }
        .customer-name { font-size: 22px; font-weight: 800; color: #f1f5f9; }
        .customer-meta { font-size: 13px; color: #94a3b8; margin-top: 2px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-item { background: #141621; border-radius: 8px; padding: 12px 16px; }
        .info-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .info-value { font-size: 14px; color: #e2e8f0; margin-top: 4px; font-weight: 500; }
        .info-value a { color: #818cf8; text-decoration: none; }
        .info-value a:hover { text-decoration: underline; }

        /* Property */
        .property-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .prop-stat { background: #141621; border-radius: 8px; padding: 12px; text-align: center; }
        .prop-stat-value { font-size: 20px; font-weight: 800; color: #f1f5f9; }
        .prop-stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; margin-top: 4px; }

        /* Analysis */
        .savings-banner { background: linear-gradient(135deg, #065f46, #047857); border-radius: 10px; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .savings-amount { font-size: 36px; font-weight: 800; color: #6ee7b7; }
        .savings-label { font-size: 13px; color: #a7f3d0; margin-top: 2px; }
        .savings-right { text-align: right; }
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

        /* Documents */
        .doc-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #141621; border-radius: 8px; margin-bottom: 8px; }
        .doc-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .doc-icon.notice { background: #1e3a5f; }
        .doc-icon.evidence { background: #312e81; }
        .doc-icon.agreement { background: #065f46; }
        .doc-icon.error { background: #7f1d1d; }
        .doc-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
        .doc-meta { font-size: 11px; color: #64748b; }
        .doc-action { margin-left: auto; }
        .doc-action a { color: #818cf8; font-size: 12px; text-decoration: none; font-weight: 600; }

        /* Timeline */
        .timeline { position: relative; padding-left: 28px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #2d3148; }
        .tl-item { position: relative; margin-bottom: 20px; }
        .tl-dot { position: absolute; left: -23px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #2d3148; }
        .tl-dot.sms { background: #22d3ee; border-color: #0e7490; }
        .tl-dot.email { background: #818cf8; border-color: #4338ca; }
        .tl-dot.upload { background: #f59e0b; border-color: #b45309; }
        .tl-dot.status { background: #a78bfa; border-color: #6d28d9; }
        .tl-dot.system { background: #64748b; border-color: #475569; }
        .tl-dot.note { background: #34d399; border-color: #059669; }
        .tl-dot.agreement { background: #6ee7b7; border-color: #065f46; }
        .tl-dot.analysis { background: #f472b6; border-color: #be185d; }
        .tl-time { font-size: 11px; color: #64748b; margin-bottom: 4px; }
        .tl-content { font-size: 13px; color: #cbd5e1; line-height: 1.5; }
        .tl-content strong { color: #f1f5f9; }
        .tl-channel { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; margin-left: 6px; }
        .tl-channel.sms { background: #164e63; color: #22d3ee; }
        .tl-channel.email { background: #1e1b4b; color: #a5b4fc; }
        .tl-channel.failed { background: #7f1d1d; color: #fca5a5; }

        /* Tasks */
        .task-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px; background: #141621; border-radius: 8px; margin-bottom: 8px; }
        .task-check { width: 20px; height: 20px; border: 2px solid #3730a3; border-radius: 6px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 2px; }
        .task-check:hover { border-color: #6366f1; background: #1e1b4b; }
        .task-check.done { background: #065f46; border-color: #059669; }
        .task-check.done::after { content: '✓'; color: #6ee7b7; font-size: 12px; font-weight: 700; }
        .task-title { font-size: 13px; color: #e2e8f0; font-weight: 500; }
        .task-meta { font-size: 11px; color: #64748b; margin-top: 4px; display: flex; gap: 12px; }
        .task-due { color: #f59e0b; }
        .task-due.overdue { color: #ef4444; }
        .task-assignee { color: #94a3b8; }

        /* Quick actions panel */
        .quick-actions { margin-bottom: 20px; }
        .action-group { margin-bottom: 16px; }
        .action-group label { display: block; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px; }
        .action-group select, .action-group textarea, .action-group input { width: 100%; background: #1a1d2e; border: 1px solid #2d3148; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 13px; font-family: inherit; }
        .action-group select:focus, .action-group textarea:focus { outline: none; border-color: #6366f1; }
        .action-group textarea { min-height: 80px; resize: vertical; }
        .action-buttons { display: flex; gap: 8px; }

        /* Action bar */
        .action-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .action-btn { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-radius: 10px; border: 1px solid #2d3148; background: #1a1d2e; color: #e2e8f0; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .action-btn:hover { border-color: #6366f1; background: #1e1b4b; }
        .action-btn .action-icon { font-size: 18px; }
        .action-btn.call { border-color: #059669; }
        .action-btn.call:hover { background: #065f46; }
        .action-btn.sms { border-color: #0891b2; }
        .action-btn.sms:hover { background: #164e63; }
        .action-btn.email { border-color: #6366f1; }
        .action-btn.email:hover { background: #312e81; }
        .action-btn.notice { border-color: #d97706; }
        .action-btn.notice:hover { background: #78350f; }
        .action-btn.sign { border-color: #a855f7; }
        .action-btn.sign:hover { background: #4c1d95; }
        .action-btn.file { border-color: #10b981; }
        .action-btn.file:hover { background: #065f46; }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Action modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 16px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #2d3148; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 16px; color: #f1f5f9; }
        .modal-close { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid #2d3148; display: flex; gap: 8px; justify-content: flex-end; }

        /* DNC banner */
        .dnc-banner { background: #7f1d1d; border: 1px solid #991b1b; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #fca5a5; font-weight: 600; }

        /* Loading / empty */
        .loading { text-align: center; padding: 60px; color: #64748b; }
        .loading .spinner { width: 32px; height: 32px; border: 3px solid #2d3148; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 30px; color: #64748b; font-size: 13px; }

        /* Toast */
        .toast { position: fixed; bottom: 24px; right: 24px; background: #065f46; color: #6ee7b7; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #7f1d1d; color: #fca5a5; }

        /* Mobile */
        @media (max-width: 900px) {
            .page { grid-template-columns: 1fr; }
            .side-col { border-left: none; border-top: 1px solid #2d3148; }
            .info-grid { grid-template-columns: 1fr; }
            .property-stats { grid-template-columns: repeat(2, 1fr); }
            .analysis-grid { grid-template-columns: 1fr; }
            .topbar { flex-direction: column; gap: 10px; align-items: flex-start; }
            .topbar-right { width: 100%; overflow-x: auto; }
            .savings-banner { flex-direction: column; text-align: center; gap: 12px; }
            .savings-right { text-align: center; }
        }
    </style>
</head>
<body>
    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <a href="/admin">← Back to Dashboard</a>
            <span class="case-id-badge" id="caseIdBadge">—</span>
            <span class="status-pill" id="statusPill">—</span>
        </div>
        <div class="topbar-right">
            <button class="btn-outline" onclick="refreshData()">↻ Refresh</button>
            <button class="btn-primary" id="btnChangeStatus" onclick="showStatusModal()">Change Status</button>
        </div>
    </div>

    <!-- Main content -->
    <div class="page">
        <div class="main-col">
            <!-- DNC Banner (hidden by default) -->
            <div class="dnc-banner" id="dncBanner" style="display:none;">
                ⛔ DO NOT CONTACT — <span id="dncReason"></span>
            </div>

            <!-- Next Best Action Banner -->
            <div id="nbaBanner" style="display:none; background: linear-gradient(135deg, #312e81, #4338ca); border: 1px solid #4f46e5; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: none;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="font-size:24px;" id="nbaIcon">🎯</div>
                    <div style="flex:1;">
                        <div style="font-size:11px; color:#a5b4fc; text-transform:uppercase; letter-spacing:0.5px; font-weight:700;">Next Best Action</div>
                        <div style="font-size:15px; color:#f1f5f9; font-weight:600; margin-top:2px;" id="nbaText"></div>
                        <div style="font-size:12px; color:#94a3b8; margin-top:4px;" id="nbaReason"></div>
                    </div>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="action-bar" id="actionBar">
                <button class="action-btn call" onclick="actionCall()" id="btnCall">
                    <span class="action-icon">📞</span> Call
                </button>
                <button class="action-btn sms" onclick="actionSMS()" id="btnSMS">
                    <span class="action-icon">💬</span> Send SMS
                </button>
                <button class="action-btn email" onclick="actionEmail()" id="btnEmail">
                    <span class="action-icon">📧</span> Send Email
                </button>
                <button class="action-btn notice" onclick="actionRequestNotice()" id="btnNotice">
                    <span class="action-icon">📄</span> Request Notice
                </button>
                <button class="action-btn sign" onclick="actionSendSigning()" id="btnSign">
                    <span class="action-icon">✍️</span> Send Signing Link
                </button>
                <button class="action-btn file" onclick="actionMarkFiled()" id="btnFile">
                    <span class="action-icon">📨</span> Mark as Filed
                </button>
            </div>

            <!-- Action Modal -->
            <div class="modal-overlay" id="actionModal">
                <div class="modal">
                    <div class="modal-header">
                        <h3 id="modalTitle">Action</h3>
                        <button class="modal-close" onclick="closeModal()">✕</button>
                    </div>
                    <div class="modal-body" id="modalBody"></div>
                    <div class="modal-footer" id="modalFooter"></div>
                </div>
            </div>

            <!-- Customer -->
            <div class="card" id="customerCard">
                <div class="card-header"><h3>👤 Customer</h3></div>
                <div class="card-body">
                    <div class="customer-header">
                        <div class="customer-avatar" id="customerAvatar">?</div>
                        <div>
                            <div class="customer-name" id="customerName">Loading...</div>
                            <div class="customer-meta" id="customerMeta">—</div>
                        </div>
                    </div>
                    <div class="info-grid" id="customerGrid"></div>
                </div>
            </div>

            <!-- Property -->
            <div class="card" id="propertyCard">
                <div class="card-header"><h3>🏠 Property</h3></div>
                <div class="card-body">
                    <div id="propertyAddress" style="font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #f1f5f9;"></div>
                    <div class="property-stats" id="propertyStats"></div>
                    <div class="info-grid" id="propertyGrid"></div>
                </div>
            </div>

            <!-- Analysis -->
            <div class="card" id="analysisCard">
                <div class="card-header"><h3>📊 Analysis</h3><span class="badge" id="analysisBadge">—</span></div>
                <div class="card-body">
                    <div id="savingsBanner"></div>
                    <div class="analysis-grid" id="analysisGrid"></div>
                </div>
            </div>

            <!-- Documents -->
            <div class="card" id="documentsCard">
                <div class="card-header"><h3>📁 Documents</h3><span class="badge" id="docCount">0</span></div>
                <div class="card-body" id="documentsBody"></div>
            </div>
        </div>

        <!-- Side column: Timeline + Tasks + Quick Actions -->
        <div class="side-col">
            <!-- Quick Actions -->
            <div class="card">
                <div class="card-header"><h3>⚡ Quick Actions</h3></div>
                <div class="card-body">
                    <div class="action-group">
                        <label>Change Status</label>
                        <select id="statusSelect">
                            <option value="">— Select —</option>
                            <option value="New">New</option>
                            <option value="Contacted">Contacted</option>
                            <option value="Awaiting Notice">Awaiting Notice</option>
                            <option value="Notice Received">Notice Received</option>
                            <option value="Needs Review">Needs Review</option>
                            <option value="Needs Info">Needs Info</option>
                            <option value="Analysis Complete">Analysis Complete</option>
                            <option value="Ready to File">Ready to File</option>
                            <option value="Filing Prepared">Filing Prepared</option>
                            <option value="Protest Filed">Protest Filed</option>
                            <option value="Hearing Scheduled">Hearing Scheduled</option>
                            <option value="Resolved">Resolved</option>
                            <option value="No Case">No Case</option>
                        </select>
                    </div>
                    <div class="action-group">
                        <button class="btn-primary" style="width:100%;" onclick="changeStatus()">Update Status</button>
                    </div>
                    <div class="action-group" style="margin-top:12px;">
                        <label>Add Note</label>
                        <textarea id="noteText" placeholder="Type a note..."></textarea>
                    </div>
                    <div class="action-group">
                        <button class="btn-outline" style="width:100%;" onclick="addNote()">Save Note</button>
                    </div>
                </div>
            </div>

            <!-- Tasks -->
            <div class="card">
                <div class="card-header"><h3>✅ Tasks</h3><span class="badge" id="taskCount">0</span></div>
                <div class="card-body" id="tasksBody">
                    <div class="empty-state">No tasks</div>
                </div>
            </div>

            <!-- Timeline -->
            <div class="card">
                <div class="card-header"><h3>📅 Timeline</h3><span class="badge" id="tlCount">0</span></div>
                <div class="card-body" id="timelineBody">
                    <div class="loading"><div class="spinner"></div>Loading timeline...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const caseId = new URLSearchParams(window.location.search).get('id');
        if (!caseId) { document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#ef4444;font-size:18px;">No case ID provided. Use ?id=OA-0025</div>'; }

        let caseData = null;
        let authToken = null;

        async function ensureAuth() {
            if (authToken) return;
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'tyler@overassessed.ai', password: 'OverAssessed!2026' })
                });
                const d = await r.json();
                authToken = d.token;
            } catch (e) {
                console.error('Auth failed:', e);
                document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#ef4444;">Auth failed. Check credentials.</div>';
            }
        }

        function apiHeaders() {
            return { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' };
        }

        async function apiGet(path) {
            await ensureAuth();
            const r = await fetch(`/api/case-view/${path}`, { headers: apiHeaders() });
            return r.json();
        }

        async function apiPost(path, data) {
            await ensureAuth();
            const r = await fetch(`/api/case-view/${path}`, {
                method: 'POST', headers: apiHeaders(), body: JSON.stringify(data)
            });
            return r.json();
        }

        function toast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = isError ? 'toast error show' : 'toast show';
            setTimeout(() => t.className = 'toast', 3000);
        }

        function fmt(val) { return val || '—'; }
        function fmtMoney(val) {
            if (!val) return '—';
            const n = typeof val === 'string' ? parseFloat(val.replace(/[$,]/g, '')) : val;
            return isNaN(n) ? val : '$' + n.toLocaleString();
        }
        function fmtDate(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        function fmtDateTime(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
                   d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }
        function relTime(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const hrs = diff / 3600000;
            if (hrs < 1) return `${Math.round(hrs * 60)}m ago`;
            if (hrs < 24) return `${Math.round(hrs)}h ago`;
            return `${Math.round(hrs / 24)}d ago`;
        }

        function statusClass(s) {
            if (!s) return '';
            const map = {
                'Ready to File': 'ready-to-file', 'Needs Review': 'needs-review',
                'Awaiting Notice': 'awaiting-notice', 'New': 'new',
                'Analysis Complete': 'analysis-complete', 'No Case': 'no-case',
                'Notice Received': 'ready-to-file', 'Filing Prepared': 'ready-to-file',
                'Protest Filed': 'analysis-complete', 'Resolved': 'ready-to-file',
            };
            return map[s] || 'new';
        }

                banner.innerHTML = `
                    <div class="savings-banner">
                        <div><div class="savings-amount">${fmtMoney(savings)}/yr</div><div class="savings-label">Estimated Annual Savings</div></div>

                            <div style="font-size:14px;color:#a7f3d0;">Assessed: ${fmtMoney(assessed)}</div>
                            <div style="font-size:12px;color:#6ee7b7;margin-top:4px;">Filing: ${d.filing_status || 'not filed'}</div>

        function computeNextBestAction(d) {
            const banner = document.getElementById('nbaBanner');
            const nbaText = document.getElementById('nbaText');
            const nbaReason = document.getElementById('nbaReason');
            const nbaIcon = document.getElementById('nbaIcon');

            const status = d.status || '';
            const hasNotice = !!d.notice_url;
            const wrongFile = (d.notes || '').includes('WRONG FILE');
            const hasSig = !!d.signature;
            const feePaid = d.initiation_fee_paid;
            const savings = d.estimated_savings || 0;
            const hasComps = d.data_validation_status !== 'insufficient_data' && !((d.comp_validation_status || '').includes('Only 0'));
            const filing = d.filing_status || 'not_filed';

            let text = '', reason = '', icon = '🎯';

            if (d.do_not_contact) {
                banner.style.display = 'none';
                return;
            }

            // Priority logic
            if (wrongFile) {
                icon = '📱'; text = `Call ${(d.owner_name || '').split(' ')[0]} — needs correct notice upload`;
                reason = 'Uploaded file is wrong (not a tax notice). Highest priority if savings are high.';
            } else if (status === 'Ready to File' && !feePaid) {
                icon = '💰'; text = `Confirm $79 initiation fee from ${(d.owner_name || '').split(' ')[0]}`;
                reason = 'Case is ready to file but initiation fee is unpaid.';
            } else if (status === 'Ready to File' && feePaid && filing === 'not_filed') {
                icon = '📨'; text = `File protest for ${(d.owner_name || '').split(' ')[0]} with ${d.county || ''} County`;
                reason = 'Fee paid, analysis complete, ready to file.';
            } else if (status === 'Analysis Complete' && savings > 0 && !hasSig) {
                icon = '✍️'; text = `Send signing link to ${(d.owner_name || '').split(' ')[0]}`;
                reason = `$${savings.toLocaleString()}/yr savings found. Need signature to proceed.`;
            } else if (status === 'Analysis Complete' && savings > 0) {
                icon = '📊'; text = `Send savings report to ${(d.owner_name || '').split(' ')[0]}`;
                reason = `$${savings.toLocaleString()}/yr savings identified. Move to close.`;
            } else if ((status === 'Awaiting Notice' || status === 'Needs Review') && !hasNotice) {
                icon = '📄'; text = `Get notice from ${(d.owner_name || '').split(' ')[0]}`;
                reason = 'Cannot proceed without Notice of Appraised Value.';
            } else if (status === 'Needs Review') {
                icon = '🔍'; text = `Review case data for ${(d.owner_name || '').split(' ')[0]}`;
                reason = d.review_reason || 'Manual review needed before proceeding.';
            } else if (status === 'New') {
                icon = '📧'; text = `Send intro message to ${(d.owner_name || '').split(' ')[0]}`;
                reason = 'New lead — first contact not yet made.';
            } else if (!hasComps && savings > 0) {
                icon = '⚠️'; text = `Insufficient comp data — manual review needed`;
                reason = 'Analysis shows savings but comp data is weak. Verify before filing.';
            } else {
                banner.style.display = 'none';
                return;
            }

            nbaIcon.textContent = icon;
            nbaText.textContent = text;
            nbaReason.textContent = reason;
            banner.style.display = 'block';
        }

        function renderAnalysisWarning(d) {
            // Add warning if insufficient comps
            const hasInsufficientData = d.data_validation_status === 'insufficient_data' || ((d.comp_validation_status || '').includes('Only 0'));
            if (hasInsufficientData && d.estimated_savings > 0) {
                const banner = document.getElementById('savingsBanner');
                banner.innerHTML += `<div style="background:#78350f;border:1px solid #92400e;border-radius:8px;padding:12px 16px;margin-top:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#fcd34d;font-weight:600;">⚠️ Insufficient comp data — savings estimate may not be reliable. Manual review recommended before filing.</div>`;
            }
        }

        function renderTimeline(activities, comms) {
            const body = document.getElementById('timelineBody');
            // Merge activities and comms into one timeline
            const items = [];

            for (const a of activities) {
                const det = a.details || {};
                let text = '', dotClass = 'system';
                switch (a.action) {
                    case 'lead_created': text = `<strong>Lead created</strong> via ${det.source || 'unknown'}`; dotClass = 'system'; break;
                    case 'drip_reminder': text = `<strong>Auto reminder</strong> (${det.type || ''}) sent`; dotClass = 'sms'; break;
                    case 'status_change': text = `<strong>Status changed</strong>${det.from ? ' from ' + det.from : ''} → <strong>${det.to || '?'}</strong>${det.reason ? ' — ' + det.reason : ''}`; dotClass = 'status'; break;
                    case 'analysis_run': text = `<strong>Analysis run</strong> — ${det.comps || 0} comps, savings ${fmtMoney(det.savings)}`; dotClass = 'analysis'; break;
                    case 'note': text = `<strong>Note:</strong> ${det.text || ''}`; dotClass = 'note'; break;
                    case 'upload': text = `<strong>Upload:</strong> ${det.type || 'file'}${det.note ? ' — ' + det.note : ''}`; dotClass = 'upload'; break;
                    case 'agreement_signed': text = `<strong>Agreement signed</strong> by ${det.name || 'customer'} (${det.form || ''})`; dotClass = 'agreement'; break;
                    case 'notice_received': text = `<strong>Notice received</strong> — ${det.county || ''} County, Market ${fmtMoney(det.market_value)}`; dotClass = 'upload'; break;
                    case 'close_attempt': text = `<strong>Close attempt</strong> via ${det.channel || 'unknown'}`; dotClass = det.channel === 'sms' ? 'sms' : 'email'; break;
                    case 'do_not_contact_set': text = `<strong>⛔ DO NOT CONTACT</strong> set — ${det.reason || ''}`; dotClass = 'system'; break;
                    case 'send_blocked_do_not_contact': text = `<strong>⛔ Send BLOCKED</strong> (DNC flag)`; dotClass = 'system'; break;
                    default: text = `<strong>${a.action}</strong>${det.reason ? ' — ' + det.reason : ''}`; dotClass = 'system';
                }
                items.push({ time: a.created_at, html: text, dotClass, actor: a.actor });
            }

            for (const c of comms) {
                const failed = c.status === 'failed';
                const channelBadge = `<span class="tl-channel ${failed ? 'failed' : c.channel}">${failed ? '✗ FAILED' : c.channel.toUpperCase()}</span>`;
                const truncBody = c.body ? (c.body.length > 120 ? c.body.slice(0, 120) + '...' : c.body) : '';
                items.push({
                    time: c.created_at,
                    html: `<strong>${c.direction === 'inbound' ? '📥 Received' : '📤 Sent'}</strong> ${channelBadge} to ${c.recipient || '?'}<br><span style="color:#94a3b8;font-size:12px;">${truncBody}</span>`,
                    dotClass: c.channel,
                    actor: c.direction === 'inbound' ? 'customer' : 'aquabot'
                });
            }

            // Sort newest first
            items.sort((a, b) => new Date(b.time) - new Date(a.time));

            document.getElementById('tlCount').textContent = items.length;
            if (items.length === 0) {
                body.innerHTML = '<div class="empty-state">No timeline events yet</div>';
                return;
            }

            body.innerHTML = '<div class="timeline">' + items.map(i => `
                <div class="tl-item">
                    <div class="tl-dot ${i.dotClass}"></div>
                    <div class="tl-time">${fmtDateTime(i.time)} · ${i.actor || 'system'}</div>
                    <div class="tl-content">${i.html}</div>
                </div>
            `).join('') + '</div>';
        }

        function renderTasks(tasks) {
            const body = document.getElementById('tasksBody');
            document.getElementById('taskCount').textContent = tasks.length;
            if (tasks.length === 0) {
                body.innerHTML = '<div class="empty-state">No tasks</div>';
                return;
            }
            const now = new Date();
            body.innerHTML = tasks.map(t => {
                const isDone = t.status === 'completed';
                const due = t.due_date ? new Date(t.due_date) : null;
                const overdue = due && !isDone && due < now;
                return `
                    <div class="task-item" data-id="${t.id}">
                        <div class="task-check ${isDone ? 'done' : ''}" onclick="toggleTask('${t.id}', ${isDone})"></div>
                        <div style="flex:1;">
                            <div class="task-title" style="${isDone ? 'text-decoration:line-through;opacity:0.5;' : ''}">${t.title}</div>
                            <div class="task-meta">
                                ${due ? `<span class="task-due ${overdue ? 'overdue' : ''}">Due ${fmtDate(t.due_date)}${overdue ? ' ⚠️ OVERDUE' : ''}</span>` : ''}
                                <span class="task-assignee">${t.assigned_to || 'unassigned'}</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function toggleTask(taskId, currentDone) {
            const newStatus = currentDone ? 'open' : 'completed';
            await apiPost('toggle-task', { task_id: taskId, status: newStatus, case_id: caseId });
            toast(newStatus === 'completed' ? '✅ Task completed' : '↩ Task reopened');
            loadTasks();
        }

        async function changeStatus() {
            const sel = document.getElementById('statusSelect');
            const newStatus = sel.value;
            if (!newStatus) return toast('Select a status first', true);
            const oldStatus = caseData.status;
            if (newStatus === oldStatus) return toast('Already at that status', true);

            await apiPost('change-status', { case_id: caseId, old_status: oldStatus, new_status: newStatus });
            toast(`Status: ${oldStatus} → ${newStatus}`);
            sel.value = '';
            await refreshData();
        }

        async function addNote() {
            const text = document.getElementById('noteText').value.trim();
            if (!text) return toast('Type a note first', true);

            await apiPost('add-note', { case_id: caseId, text });
            document.getElementById('noteText').value = '';
            toast('✅ Note saved');
            await loadTimeline();
        }

        async function loadCase() {
            const data = await apiGet(`case/${caseId}`);
            if (!data || data.error) {
                document.querySelector('.page').innerHTML = '<div style="padding:60px;text-align:center;color:#ef4444;font-size:18px;">Case not found: ' + caseId + (data?.error ? ' — ' + data.error : '') + '</div>';
                return;
            }
            caseData = data;
            document.title = `${caseId} — ${caseData.owner_name} — OverAssessed`;
            document.getElementById('caseIdBadge').textContent = caseId;
            const pill = document.getElementById('statusPill');
            pill.textContent = caseData.status;
            pill.className = 'status-pill status-' + statusClass(caseData.status);

            renderCustomer(caseData);
            renderProperty(caseData);
            renderAnalysis(caseData);
            renderDocuments(caseData);
            computeNextBestAction(caseData);
            renderAnalysisWarning(caseData);
        }

        async function loadTimeline() {
            const data = await apiGet(`timeline/${caseId}`);
            renderTimeline(data?.activities || [], data?.communications || []);
        }

        async function loadTasks() {
            const data = await apiGet(`tasks/${caseId}`);
            renderTasks(data?.tasks || []);
        }

        async function refreshData() {
            await Promise.all([loadCase(), loadTimeline(), loadTasks()]);
            toast('↻ Refreshed');
        }

        // ========== ACTION BAR FUNCTIONS ==========

        function closeModal() {
            document.getElementById('actionModal').classList.remove('show');
        }
        document.getElementById('actionModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        function openModal(title, bodyHtml, footerHtml) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('modalFooter').innerHTML = footerHtml;
            document.getElementById('actionModal').classList.add('show');
        }

        function updateActionBarState() {
            if (!caseData) return;
            const d = caseData;
            document.getElementById('btnCall').disabled = !d.phone;
            document.getElementById('btnSMS').disabled = !d.phone;
            document.getElementById('btnEmail').disabled = !d.email;
            // Disable notice request if already uploaded (and not wrong file)
            const hasValidNotice = d.notice_url && !(d.notes || '').includes('WRONG FILE');
            document.getElementById('btnNotice').disabled = hasValidNotice;
            // Disable signing if already signed
            document.getElementById('btnSign').disabled = !!(d.signature || d.fee_agreement_signed);
            // Disable filed if already filed
            document.getElementById('btnFile').disabled = (d.filing_status === 'filed' || d.status === 'Filed');
        }

        // 1. CALL — click-to-call + log
        async function actionCall() {
            if (!caseData?.phone) return toast('No phone number on file', true);
            const phone = caseData.phone;
            const name = (caseData.owner_name || '').split(' ')[0];

            openModal('📞 Call ' + name, `
                <div style="text-align:center;">
                    <div style="font-size:32px;font-weight:800;color:#6ee7b7;margin:16px 0;">
                        <a href="tel:${phone}" style="color:#6ee7b7;text-decoration:none;">${phone}</a>
                    </div>
                    <div style="color:#94a3b8;font-size:13px;">Click to dial on your device, then log the result below.</div>
                    <div class="action-group" style="margin-top:20px;text-align:left;">
                        <label>Call Outcome</label>
                        <select id="callOutcome" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;">
                            <option value="connected">✅ Connected — spoke with customer</option>
                            <option value="voicemail">📱 Left voicemail</option>
                            <option value="no_answer">❌ No answer / no voicemail</option>
                            <option value="wrong_number">⚠️ Wrong number</option>
                            <option value="callback_requested">↩ Callback requested</option>
                        </select>
                    </div>
                    <div class="action-group" style="margin-top:12px;text-align:left;">
                        <label>Notes (optional)</label>
                        <textarea id="callNotes" placeholder="What was discussed..." style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;font-family:inherit;min-height:60px;"></textarea>

                </div>
            `, `
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="logCall()">Log Call</button>
            `);
        }

        async function logCall() {
            const outcome = document.getElementById('callOutcome').value;
            const notes = document.getElementById('callNotes').value.trim();
            try {
                await apiPost('action/call', {
                    case_id: caseId,
                    phone: caseData.phone,
                    outcome,
                    notes
                });
                closeModal();
                toast('✅ Call logged');
                await refreshData();
            } catch (e) {
                toast('❌ Failed to log call', true);
            }
        }

        // 2. SEND SMS — pre-filled template
        async function actionSMS() {
            if (!caseData?.phone) return toast('No phone number on file', true);
            const name = (caseData.owner_name || '').split(' ')[0];
            const status = caseData.status || '';
            let template = '';

            if (status === 'New' || status === 'Needs Review') {
                template = `Hi ${name}, this is OverAssessed. We reviewed your property and may be able to save you money on your property taxes. Do you have a few minutes to discuss?`;
            } else if (status === 'Awaiting Notice') {
                template = `Hi ${name}, have you received your Notice of Appraised Value from ${caseData.county || 'your'} County yet? We need it to run your full analysis. You can upload it at overassessed.ai/upload — it takes 30 seconds.`;
            } else if (status === 'Analysis Complete') {
                template = `Hi ${name}, great news — our analysis shows potential savings of ${fmtMoney(caseData.estimated_savings)}/yr on your property taxes. Ready to move forward? Check your email for the details.`;
            } else if (status === 'Ready to File') {
                template = `Hi ${name}, your case is ready to file! Just need your initiation fee ($79) to get the protest submitted to ${caseData.county || 'your'} County. Any questions?`;
            } else {
                template = `Hi ${name}, this is OverAssessed checking in on your property tax case. Let us know if you have any questions.`;
            }

            openModal('💬 Send SMS to ' + name, `
                <div style="color:#94a3b8;font-size:12px;margin-bottom:8px;">To: ${caseData.phone}</div>
                <div class="action-group">
                    <label>Message</label>
                    <textarea id="smsBody" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;font-family:inherit;min-height:120px;">${template}</textarea>
                </div>
                <div style="font-size:11px;color:#64748b;text-align:right;" id="smsCharCount">${template.length} chars</div>
            `, `
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="sendSMS()">Send SMS</button>
            `);

            setTimeout(() => {
                const ta = document.getElementById('smsBody');
                if (ta) ta.addEventListener('input', () => {
                    document.getElementById('smsCharCount').textContent = ta.value.length + ' chars';
                });
            }, 100);
        }

        async function sendSMS() {
            const body = document.getElementById('smsBody').value.trim();
            if (!body) return toast('Message is empty', true);
            try {
                const result = await apiPost('action/sms', {
                    case_id: caseId,
                    phone: caseData.phone,
                    body,
                    owner_name: caseData.owner_name
                });
                closeModal();
                toast('✅ SMS sent');
                await refreshData();
            } catch (e) {
                toast('❌ Failed to send SMS', true);
            }
        }

        // 3. SEND EMAIL — pre-filled template
        async function actionEmail() {
            if (!caseData?.email) return toast('No email on file', true);
            const name = (caseData.owner_name || '').split(' ')[0];
            const status = caseData.status || '';
            let subject = '', body = '';

            if (status === 'New' || status === 'Needs Review') {
                subject = `Your Property Tax Review — ${caseData.property_address || 'Your Property'}`;
                body = `Hi ${name},\n\nThank you for your interest in OverAssessed. We've reviewed your property at ${caseData.property_address || 'your address'} and believe there may be an opportunity to reduce your property taxes.\n\nWe'd love to discuss the details with you. Would you have a few minutes this week?\n\nBest,\nOverAssessed Team`;
            } else if (status === 'Awaiting Notice') {
                subject = `Action Needed: Upload Your Notice of Appraised Value`;
                body = `Hi ${name},\n\nTo complete your property tax analysis, we need your Notice of Appraised Value from ${caseData.county || 'your'} County.\n\nYou can upload it quickly here: https://overassessed.ai/upload\n\nThe notice is typically mailed in April-May. If you haven't received it yet, let us know and we'll keep your case ready.\n\nBest,\nOverAssessed Team`;
            } else if (status === 'Analysis Complete') {
                subject = `Your Savings Report — ${fmtMoney(caseData.estimated_savings)}/yr Potential Savings`;
                body = `Hi ${name},\n\nGreat news! Our analysis of your property at ${caseData.property_address || 'your address'} shows potential annual savings of ${fmtMoney(caseData.estimated_savings)}.\n\nNext steps:\n1. Review the analysis attached to this email\n2. Sign the authorization form (Form 50-162)\n3. We file your protest — no further action needed from you\n\nReady to move forward? Reply to this email or call us.\n\nBest,\nOverAssessed Team`;
            } else if (status === 'Ready to File') {
                subject = `Ready to File — One Last Step`;
                body = `Hi ${name},\n\nYour property tax protest is fully prepared and ready to file with ${caseData.county || 'your'} County.\n\nTo proceed, we just need the $79 initiation fee. Once received, we'll file immediately.\n\nAny questions? We're here to help.\n\nBest,\nOverAssessed Team`;
            } else {
                subject = `Update on Your Property Tax Case — ${caseId}`;
                body = `Hi ${name},\n\nJust checking in on your property tax case. Please let us know if you have any questions or need anything from our team.\n\nBest,\nOverAssessed Team`;
            }

            openModal('📧 Send Email to ' + name, `
                <div style="color:#94a3b8;font-size:12px;margin-bottom:12px;">To: ${caseData.email}</div>
                <div class="action-group">
                    <label>Subject</label>
                    <input type="text" id="emailSubject" value="${subject}" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;" />
                </div>
                <div class="action-group">
                    <label>Body</label>
                    <textarea id="emailBody" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;font-family:inherit;min-height:200px;">${body}</textarea>
                </div>
            `, `
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="sendEmail()">Send Email</button>
            `);
        }

        async function sendEmail() {
            const subject = document.getElementById('emailSubject').value.trim();
            const body = document.getElementById('emailBody').value.trim();
            if (!subject || !body) return toast('Subject and body required', true);
            try {
                await apiPost('action/email', {
                    case_id: caseId,
                    email: caseData.email,
                    subject,
                    body,
                    owner_name: caseData.owner_name
                });
                closeModal();
                toast('✅ Email sent');
                await refreshData();
            } catch (e) {
                toast('❌ Failed to send email', true);
            }
        }

        // 4. REQUEST NOTICE
        async function actionRequestNotice() {
            const name = (caseData?.owner_name || '').split(' ')[0];
            const hasPhone = !!caseData?.phone;
            const hasEmail = !!caseData?.email;

            let channels = '';
            if (hasPhone && hasEmail) {
                channels = `
                    <div class="action-group">
                        <label>Send via</label>
                        <select id="noticeChannel" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;">
                            <option value="both">📱 SMS + 📧 Email (recommended)</option>
                            <option value="sms">📱 SMS only</option>
                            <option value="email">📧 Email only</option>
                        </select>
                    </div>`;
            } else {
                channels = `<input type="hidden" id="noticeChannel" value="${hasPhone ? 'sms' : 'email'}">`;
            }

            openModal('📄 Request Notice from ' + name, `
                <div style="background:#141621;border-radius:8px;padding:16px;margin-bottom:16px;">
                    <div style="font-size:13px;color:#fcd34d;">📋 This will send a pre-written request asking ${name} to upload their Notice of Appraised Value.</div>
                </div>
                ${channels}
                <div style="background:#141621;border-radius:8px;padding:14px;margin-top:12px;">
                    <div style="font-size:11px;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Preview (SMS)</div>
                    <div style="font-size:13px;color:#94a3b8;">Hi ${name}, have you received your Notice of Appraised Value from ${caseData.county || 'your'} County? Upload it at overassessed.ai/upload — takes 30 seconds. We need it to file your protest.</div>
                </div>
            `, `
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="sendNoticeRequest()">Send Request</button>
            `);
        }

        async function sendNoticeRequest() {
            const channel = document.getElementById('noticeChannel').value;
            try {
                await apiPost('action/request-notice', {
                    case_id: caseId,
                    channel,
                    phone: caseData.phone,
                    email: caseData.email,
                    owner_name: caseData.owner_name,
                    county: caseData.county
                });
                closeModal();
                toast('✅ Notice request sent');
                await refreshData();
            } catch (e) {
                toast('❌ Failed to send request', true);
            }
        }

        // 5. SEND SIGNING LINK
        async function actionSendSigning() {
            const name = (caseData?.owner_name || '').split(' ')[0];
            const hasPhone = !!caseData?.phone;
            const hasEmail = !!caseData?.email;
            const savings = fmtMoney(caseData.estimated_savings);

            let channels = '';
            if (hasPhone && hasEmail) {
                channels = `
                    <div class="action-group">
                        <label>Send via</label>
                        <select id="signChannel" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;">
                            <option value="both">📱 SMS + 📧 Email (recommended)</option>
                            <option value="sms">📱 SMS only</option>
                            <option value="email">📧 Email only</option>
                        </select>
                    </div>`;
            } else {
                channels = `<input type="hidden" id="signChannel" value="${hasPhone ? 'sms' : 'email'}">`;
            }

            openModal('✍️ Send Signing Link to ' + name, `
                <div style="background:#065f46;border-radius:8px;padding:16px;margin-bottom:16px;">
                    <div style="font-size:13px;color:#6ee7b7;">💰 Potential savings: <strong>${savings}/yr</strong></div>
                    <div style="font-size:12px;color:#a7f3d0;margin-top:4px;">This sends the Form 50-162 signing link + fee agreement.</div>
                </div>
                ${channels}
                <div style="background:#141621;border-radius:8px;padding:14px;margin-top:12px;">
                    <div style="font-size:11px;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Preview (SMS)</div>
                    <div style="font-size:13px;color:#94a3b8;">Hi ${name}, your analysis is complete — ${savings}/yr potential savings! Sign the authorization form here to get your protest filed: [signing link]. Questions? Reply to this text.</div>
                </div>
            `, `
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="sendSigningLink()">Send Signing Link</button>
            `);
        }

        async function sendSigningLink() {
            const channel = document.getElementById('signChannel').value;
            try {
                await apiPost('action/send-signing', {
                    case_id: caseId,
                    channel,
                    phone: caseData.phone,
                    email: caseData.email,
                    owner_name: caseData.owner_name,
                    estimated_savings: caseData.estimated_savings
                });
                closeModal();
                toast('✅ Signing link sent');
                await refreshData();
            } catch (e) {
                toast('❌ Failed to send signing link', true);
            }
        }

        // 6. MARK AS FILED
        async function actionMarkFiled() {
            const name = (caseData?.owner_name || '').split(' ')[0];
            openModal('📨 Mark as Filed — ' + caseId, `
                <div style="background:#065f46;border-radius:8px;padding:16px;margin-bottom:16px;">
                    <div style="font-size:13px;color:#6ee7b7;">This marks the protest as filed with ${caseData.county || 'the'} County and updates the case status.</div>
                </div>
                <div class="action-group">
                    <label>Filing Date</label>
                    <input type="date" id="filingDate" value="${new Date().toISOString().split('T')[0]}" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;" />
                </div>
                <div class="action-group">
                    <label>Confirmation # (optional)</label>
                    <input type="text" id="filingConfirmation" placeholder="e.g. ARB-2026-12345" style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;" />
                </div>
                <div class="action-group">
                    <label>Notes (optional)</label>
                    <textarea id="filingNotes" placeholder="Any filing notes..." style="width:100%;background:#141621;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;font-family:inherit;min-height:60px;"></textarea>
                </div>
                <div style="margin-top:12px;">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#e2e8f0;">
                        <input type="checkbox" id="filingNotify" checked style="accent-color:#6366f1;" />
                        Notify customer that protest has been filed
                    </label>
                </div>
            `, `
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-success" onclick="markFiled()">✅ Mark as Filed</button>
            `);
        }

        async function markFiled() {
            const filingDate = document.getElementById('filingDate').value;
            const confirmation = document.getElementById('filingConfirmation').value.trim();
            const notes = document.getElementById('filingNotes').value.trim();
            const notify = document.getElementById('filingNotify').checked;
            try {
                await apiPost('action/mark-filed', {
                    case_id: caseId,
                    filing_date: filingDate,
                    confirmation_number: confirmation,
                    notes,
                    notify_customer: notify,
                    phone: caseData.phone,
                    email: caseData.email,
                    owner_name: caseData.owner_name,
                    county: caseData.county
                });
                closeModal();
                toast('✅ Protest marked as filed');
                await refreshData();
            } catch (e) {
                toast('❌ Failed to mark as filed', true);
            }
        }

        // Hook into loadCase to update action bar state
        const _origLoadCase = loadCase;
        loadCase = async function() {
            await _origLoadCase();
            updateActionBarState();
        };

        // Init
        if (caseId) {
            loadCase();
            loadTimeline();
            loadTasks();
        }
    </script>
</body>
</html>
